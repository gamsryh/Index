<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QSHE Task Monitor · สบค.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F151B;
    --panel: #1A222B;
    --panel-hover: #202B36;
    --border: #2A3642;
    --text: #E7ECF1;
    --text-dim: #8996A3;
    --text-faint: #56636F;
    --red: #E5484D;
    --red-bg: #2B1618;
    --amber: #F5A623;
    --amber-bg: #2B2110;
    --green: #3DD68C;
    --green-bg: #10261C;
    --blue: #4C9FE8;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans Thai', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  header{
    padding:28px 32px 20px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:12px;
  }
  header .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:0 0 6px;
  }
  header h1{
    margin:0;
    font-size:22px;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  #last-sync{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--text-dim);
    text-align:right;
  }
  #last-sync .dot{
    display:inline-block;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--green);
    margin-right:6px;
    box-shadow:0 0 0 3px rgba(61,214,140,0.15);
  }

  main{ max-width:1180px; margin:0 auto; padding:28px 32px 64px; }

  #status-line{
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--text-dim);
    font-size:13px;
    padding:40px 0;
  }
  .spinner{
    width:14px;height:14px;
    border:2px solid var(--border);
    border-top-color:var(--blue);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  #error-box{
    display:none;
    background:var(--red-bg);
    border:1px solid rgba(229,72,77,0.35);
    border-radius:var(--radius);
    padding:16px 18px;
    color:#F2A6A9;
    font-size:13px;
    line-height:1.6;
  }
  #error-box code{
    font-family:'IBM Plex Mono', monospace;
    background:rgba(255,255,255,0.06);
    padding:2px 5px;
    border-radius:4px;
    font-size:12px;
  }

  .kpi-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-bottom:28px;
  }
  .kpi{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 18px;
  }
  .kpi .label{ font-size:12px; color:var(--text-dim); margin:0 0 8px; }
  .kpi .value{
    font-family:'IBM Plex Mono', monospace;
    font-size:28px;
    font-weight:600;
    margin:0;
    line-height:1;
  }
  .kpi.k-total .value{ color:var(--text); }
  .kpi.k-done .value{ color:var(--green); }
  .kpi.k-overdue .value{ color:var(--red); }
  .kpi.k-critical .value{ color:var(--amber); }

  .section-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-label::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--border);
  }

  #overview-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:12px;
    margin-bottom:32px;
  }
  .sys-card{
    cursor:pointer;
    background:var(--panel);
    border:1px solid var(--border);
    border-left:3px solid var(--border-accent, var(--border));
    border-radius:var(--radius);
    padding:16px 18px;
    transition:transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
  }
  .sys-card:hover{ transform:translateY(-2px); background:var(--panel-hover); }
  .sys-card .sys-name{ font-size:14px; font-weight:600; margin:0 0 10px; }
  .sys-card .sys-count{
    font-family:'IBM Plex Mono', monospace;
    font-size:24px; font-weight:600; margin:0 0 4px; line-height:1;
  }
  .sys-card .sys-count small{ font-size:12px; font-weight:400; color:var(--text-dim); }
  .sys-card .sys-meta{ font-size:12px; color:var(--text-dim); margin:0; }
  .sys-card .bar{
    height:4px; border-radius:2px; background:var(--border);
    margin-top:12px; overflow:hidden;
  }
  .sys-card .bar-fill{ height:100%; border-radius:2px; }

  #detail-view{ display:none; }
  .back-link{
    background:none; border:none; color:var(--text-dim);
    font-family:'IBM Plex Mono', monospace; font-size:12px;
    cursor:pointer; padding:0; margin-bottom:16px;
    display:flex; align-items:center; gap:6px;
  }
  .back-link:hover{ color:var(--text); }
  #detail-header{ display:flex; align-items:baseline; gap:10px; margin-bottom:2px; }
  #detail-header h2{ margin:0; font-size:18px; }
  #detail-sub{ color:var(--text-dim); font-size:13px; margin:0 0 18px; }

  .filters{ display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .filters select{
    background:var(--panel); color:var(--text);
    border:1px solid var(--border); border-radius:7px;
    padding:7px 10px; font-size:13px; font-family:inherit;
  }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  thead th{
    text-align:left; padding:9px 10px;
    background:var(--panel); color:var(--text-dim);
    font-weight:500; font-size:11px; letter-spacing:0.04em; text-transform:uppercase;
    border-bottom:1px solid var(--border);
  }
  tbody td{ padding:10px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
  tbody tr:hover{ background:rgba(255,255,255,0.02); }
  .badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12px; white-space:nowrap;
  }
  .badge .swatch{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .due-overdue{ color:var(--red); }
  .score{ font-family:'IBM Plex Mono', monospace; color:var(--text-dim); font-size:12px; }

  ::selection{ background:rgba(76,159,232,0.3); }

  @media (max-width:720px){
    .kpi-row{ grid-template-columns:repeat(2,1fr); }
    header{ padding:20px; }
    main{ padding:20px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <p class="eyebrow">QSHE · สบค.ฝผม.</p>
    <h1>Task Monitor</h1>
  </div>
  <div id="last-sync"><span class="dot"></span>syncing…</div>
</header>

<main>
  <div id="status-line"><span class="spinner"></span> กำลังโหลดข้อมูลจาก Google Sheets…</div>
  <div id="error-box"></div>

  <div id="content" style="display:none;">

    <div class="kpi-row">
      <div class="kpi k-total"><p class="label">งานทั้งหมด</p><p class="value" id="kpi-total">–</p></div>
      <div class="kpi k-done"><p class="label">เสร็จสมบูรณ์</p><p class="value" id="kpi-done">–</p></div>
      <div class="kpi k-overdue"><p class="label">เลยกำหนด</p><p class="value" id="kpi-overdue">–</p></div>
      <div class="kpi k-critical"><p class="label">Critical</p><p class="value" id="kpi-critical">–</p></div>
    </div>

    <div id="overview-view">
      <p class="section-label">ภาพรวมแยกตามระบบ · คลิกเพื่อดูรายละเอียด</p>
      <div id="overview-grid"></div>
    </div>

    <div id="detail-view">
      <button class="back-link" id="back-btn">← กลับไปภาพรวม</button>
      <div id="detail-header"><h2 id="detail-title"></h2></div>
      <p id="detail-sub"></p>

      <div class="filters">
        <select id="f-status"><option value="">ทุกสถานะ</option></select>
        <select id="f-priority">
          <option value="">ทุก Priority</option>
          <option>Critical</option>
          <option>At Risk</option>
          <option>On Track</option>
          <option>Completed</option>
        </select>
      </div>

      <table>
        <thead>
          <tr>
            <th style="width:38%">กิจกรรม</th>
            <th style="width:14%">ผู้รับผิดชอบ</th>
            <th style="width:12%">กำหนด</th>
            <th style="width:18%">สถานะ</th>
            <th style="width:18%">Action</th>
          </tr>
        </thead>
        <tbody id="detail-rows"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
/* ------------------------------------------------------------------
   ตั้งค่า URL ของ Apps Script Web App ตรงนี้
------------------------------------------------------------------ */
const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbzqRK1Ozcg-9MxpjOoKu1gCYJIhCJNeshseG2Qcd6NHHUrRWfT8ELIw6rMiE2E9pKmb2w/exec';

const colorMap = {
  'Completed': 'var(--green)',
  'On Track':  'var(--blue)',
  'At Risk':   'var(--amber)',
  'Critical':  'var(--red)'
};

function priorityLabel(raw){
  if(!raw) return '';
  return raw.replace(/[^\w\sก-๙]/g,'').trim(); // ตัด emoji ออก เหลือแค่ข้อความ
}

function isOverdue(task){
  if(!task.due_date) return false;
  const due = new Date(task.due_date);
  const today = new Date(); today.setHours(0,0,0,0);
  const isDone = (task.status === 'เสร็จสมบูรณ์');
  return due < today && !isDone;
}

function heatColor(rate){
  if(rate >= 0.3) return { border:'var(--red)', bar:'var(--red)' };
  if(rate >= 0.15) return { border:'var(--amber)', bar:'var(--amber)' };
  if(rate > 0)     return { border:'#5A4A24', bar:'var(--amber)' };
  return { border:'var(--green)', bar:'var(--green)' };
}

let DATA = [];

async function loadData(){
  try{
    const res = await fetch(SHEET_API_URL);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if(!Array.isArray(json) || json.length === 0){
      throw new Error('EMPTY');
    }
    DATA = json.map(d => ({
      ...d,
      priority_clean: priorityLabel(d.priority || d.priority_status || ''),
      overdue: typeof d.is_overdue !== 'undefined' ? !!Number(d.is_overdue) : isOverdue(d)
    }));
    document.getElementById('status-line').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    const now = new Date();
    document.getElementById('last-sync').innerHTML =
      '<span class="dot"></span>อัปเดตล่าสุด ' + now.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
    render();
  }catch(err){
    document.getElementById('status-line').style.display = 'none';
    const box = document.getElementById('error-box');
    box.style.display = 'block';
    box.innerHTML =
      '<strong>ดึงข้อมูลไม่สำเร็จ</strong><br><br>' +
      'สาเหตุที่เป็นไปได้:<br>' +
      '1. Apps Script ยังไม่ได้ตั้งค่า "Who has access" เป็น <code>Anyone</code><br>' +
      '2. URL ไม่ถูกต้อง หรือยังไม่ได้ Deploy เป็น Web app เวอร์ชันล่าสุด<br>' +
      '3. ชื่อชีทในสูตร (<code>SHEET_NAME</code>) ไม่ตรงกับชื่อชีทจริง<br><br>' +
      'รายละเอียด error: <code>' + err.message + '</code>';
  }
}

function render(){
  renderKPIs(DATA);
  renderOverview(DATA);
}

function renderKPIs(data){
  document.getElementById('kpi-total').textContent = data.length;
  document.getElementById('kpi-done').textContent = data.filter(d => d.priority_clean === 'Completed' || d.status === 'เสร็จสมบูรณ์').length;
  document.getElementById('kpi-overdue').textContent = data.filter(d => d.overdue).length;
  document.getElementById('kpi-critical').textContent = data.filter(d => d.priority_clean === 'Critical').length;
}

function renderOverview(data){
  const grid = document.getElementById('overview-grid');
  grid.innerHTML = '';
  const systems = [...new Set(data.map(d => d.system).filter(Boolean))].sort();

  systems.forEach(sys => {
    const items = data.filter(d => d.system === sys);
    const overdue = items.filter(d => d.overdue).length;
    const critical = items.filter(d => d.priority_clean === 'Critical').length;
    const rate = items.length ? overdue / items.length : 0;
    const col = heatColor(rate);

    const card = document.createElement('div');
    card.className = 'sys-card';
    card.style.borderLeftColor = col.border;
    card.innerHTML =
      '<p class="sys-name">' + sys + '</p>' +
      '<p class="sys-count">' + overdue + ' <small>/ ' + items.length + ' เลยกำหนด</small></p>' +
      '<p class="sys-meta">' + critical + ' critical</p>' +
      '<div class="bar"><div class="bar-fill" style="width:' + Math.round(rate*100) + '%;background:' + col.bar + ';"></div></div>';
    card.addEventListener('click', () => showDetail(sys));
    grid.appendChild(card);
  });

  if(systems.length === 0){
    grid.innerHTML = '<p style="color:var(--text-dim);font-size:13px;">ไม่พบข้อมูลคอลัมน์ระบบ (system) ในชีท</p>';
  }
}

function showDetail(sys){
  document.getElementById('overview-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('detail-title').textContent = sys;

  const items = DATA.filter(d => d.system === sys);
  const overdue = items.filter(d => d.overdue).length;
  document.getElementById('detail-sub').textContent = items.length + ' งาน · ' + overdue + ' เลยกำหนด';

  const statuses = [...new Set(items.map(d => d.status).filter(Boolean))];
  const fStatus = document.getElementById('f-status');
  fStatus.innerHTML = '<option value="">ทุกสถานะ</option>' + statuses.map(s => '<option>'+s+'</option>').join('');
  document.getElementById('f-priority').value = '';

  function renderRows(){
    const fs = fStatus.value;
    const fp = document.getElementById('f-priority').value;
    let rows = items.filter(d => (!fs || d.status === fs) && (!fp || d.priority_clean === fp));
    rows.sort((a,b) => (b.priority_score||0) - (a.priority_score||0));

    const tbody = document.getElementById('detail-rows');
    tbody.innerHTML = '';
    rows.forEach(d => {
      const color = colorMap[d.priority_clean] || 'var(--text-dim)';
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + (d.activity||'') + '</td>' +
        '<td style="color:var(--text-dim);">' + (d.responsible||'') + '</td>' +
        '<td class="mono ' + (d.overdue ? 'due-overdue' : '') + '">' + (d.due_date||'') + '</td>' +
        '<td><span class="badge"><span class="swatch" style="background:' + color + ';"></span>' +
          (d.priority_clean || d.status || '') + (d.overdue ? ' · เลยกำหนด' : '') + '</span></td>' +
        '<td style="color:var(--text-dim);">' + (d.action || '') + '</td>';
      tbody.appendChild(tr);
    });
  }
  fStatus.onchange = renderRows;
  document.getElementById('f-priority').onchange = renderRows;
  renderRows();
}

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('overview-view').style.display = 'block';
});

loadData();
// รีเฟรชข้อมูลอัตโนมัติทุก 5 นาที
setInterval(loadData, 5 * 60 * 1000);
</script>

</body>
</html>
